services:
  app:
    image: ghcr.io/sirtheta/sanitaetsplaner:latest
    container_name: sanitaetsplaner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "file:/app/data/sanitaetsplaner.db"
      NODE_ENV: production
      # `docker compose up` works without a .env file: when AUTH_SECRET /
      # ENCRYPTION_KEY are not provided, the container generates random ones
      # on first start and persists them in the data volume (./data). To use
      # your own values, set them via .env (see .env.example) — explicitly
      # configured values always take precedence over generated ones.
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
