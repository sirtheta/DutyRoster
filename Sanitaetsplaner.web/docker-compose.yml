services:
  app:
    image: ghcr.io/sirtheta/sanitaetsplaner:latest
    container_name: sanitaetsplaner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "file:/app/data/sanitaetsplaner.db"
      NODE_ENV: production
      # values so `docker compose up` works without a .env file.
      # These are NOT secret and NOT secure — anyone with this repo knows them.
      # For a real deployment, override via .env (see .env.example) with your
      # own generated AUTH_SECRET / ENCRYPTION_KEY and the correct AUTH_URL.
      AUTH_SECRET: ${AUTH_SECRET:-INSECURE-DEFAULT-CHANGE-ME-min-32-characters-long}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-INSECURE-DEFAULT-CHANGE-ME-not-a-real-key}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
