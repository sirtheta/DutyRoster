services:
  app:
    image: ghcr.io/sirtheta/sanitaetsplaner:latest
    container_name: sanitaetsplaner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/app/data/sanitaetsplaner.db"
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
