version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/Sanitaetsplaner.web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    ignore:
      - dependency-name: "nodemailer"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
